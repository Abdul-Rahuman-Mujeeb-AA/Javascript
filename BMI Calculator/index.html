<!DOCTYPE html>
<html lang="en">
    <head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <title>Advanced BMI Calculator</title>

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet">
        <link rel="stylesheet" href="style.css">

    </head>

    <body>

        <div class="container main-container">

            <div class="card bmi-card shadow-lg">

                <div class="card-body">

                    <h2 class="text-center mb-4">BMI Calculator</h2>

                    <div class="text-center mb-3">
                        <button class="btn btn-outline-primary active"
                            id="metricBtn">Metric</button>
                        <button class="btn btn-outline-primary"
                            id="imperialBtn">Imperial</button>
                    </div>

                    <div id="metricInputs">

                        <div class="mb-3">
                            <label class="form-label">Height (cm)</label>
                            <input type="number" id="heightCm" placeholder="."
                                class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Weight (kg)</label>
                            <input type="number" id="weightKg" placeholder="."
                                class="form-control">
                        </div>

                    </div>

                    <div id="imperialInputs">

                        <div class="mb-3">
                            <label class="form-label">Height (inches)</label>
                            <input type="number" id="heightIn" placeholder="."
                                class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Weight (lbs)</label>
                            <input type="number" id="weightLb" placeholder="."
                                class="form-control">
                        </div>

                    </div>

                    <button class="btn btn-primary w-100"
                        onclick="calculateBMI()">Calculate BMI</button>

                    <div class="result-box mt-4 text-center">

                        <h4 id="bmiValue"></h4>
                        <p id="bmiCategory"></p>

                        <div class="progress mt-3">
                            <div id="bmiBar" class="progress-bar"></div>
                        </div>

                    </div>

                </div>
            </div>

        </div>

        <script src="script.js"></script>

    </body>
</html>
