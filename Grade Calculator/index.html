<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Grade Calculator</title>
        <!-- Bootstrap CDN -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="container main-container">
            <h2 class="text-center mb-4">Student Grade Calculator</h2>
            <div class="form-grid">

                <div class="form-group">
                    <label>Tamil</label>
                    <input type="number" id="s1" class="form-control" min="0"
                        max="100" placeholder="Enter Marks">
                </div>

                <div class="form-group">
                    <label>English</label>
                    <input type="number" id="s2" class="form-control" min="0"
                        max="100" placeholder="Enter Marks">
                </div>

                <div class="form-group">
                    <label>Maths</label>
                    <input type="number" id="s3" class="form-control" min="0"
                        max="100" placeholder="Enter Marks">
                </div>

                <div class="form-group">
                    <label>Physics</label>
                    <input type="number" id="s4" class="form-control" min="0"
                        max="100" placeholder="Enter Marks">
                </div>

                <div class="form-group">
                    <label>Chemistry</label>
                    <input type="number" id="s5" class="form-control" min="0"
                        max="100" placeholder="Enter Marks">
                </div>

                <div class="form-group">
                    <label>Computer Science</label>
                    <input type="number" id="s6" class="form-control" min="0"
                        max="100" placeholder="Enter Marks">
                </div>

            </div>

            <div class="button-area">
                <button class="btn btn-primary"
                    onclick="calculateGrade()">Calculate Grade</button>
                <button class="btn btn-danger"
                    onclick="eraseMarks()">Erase</button>
            </div>

            <div id="result" class="result-box"></div>

        </div>

        <script src="script.js"></script>

    </body>
</html>
